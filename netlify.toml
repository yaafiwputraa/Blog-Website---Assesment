# Netlify configuration for the React (Vite) frontend in client/
[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"

# SPA fallback: let React Router handle client-side routes (e.g. /posts/:id)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
